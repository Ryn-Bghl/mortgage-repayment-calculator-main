<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap"
			rel="stylesheet"
		/>

		<title>Frontend Mentor | Mortgage repayment calculator</title>
		<link rel="stylesheet" href="style.css" />
		<script src="script.js"></script>
	</head>
	<body>
		<div class="container">
			<div class="calculator">
				<header class="title">
					<h1>Mortgage Calculator</h1>
					<button class="subtitle" type="reset"><u>Clear All</u></button>
				</header>

				<form id="mortgage-form">
					<div class="form-group">
						<label for="mortgage-amount">Mortgage Amount</label>
						<input type="number" id="mortgage-amount" required />
					</div>
					<div class="form-group">
						<label for="mortgage-term">Mortgage Term</label>
						<input type="number" id="mortgage-term" required />
					</div>
					<div class="form-group">
						<label for="interest-rate">Annual Interest Rate</label>
						<input type="number" id="interest-rate" required />
					</div>
					<div class="form-group">
						<label for="mortgage-type">Mortgage Type</label>
						<div class="radio-group">
							<input
								type="radio"
								name="mortgage-type"
								id="repayment"
								value="repayment"
							/>
							<label for="repayment">Repayment</label>
							<input
								type="radio"
								name="mortgage-type"
								id="interest-only"
								value="interest-only"
							/>
							<label for="interest-only">Interest Only</label>
						</div>
					</div>
					<button type="submit">Calculate Repayment</button>
				</form>
			</div>
			<div class="results">
				<center>
					<img
						src="assets/images/illustration-empty.svg"
						alt="calculator icon"
					/>
				</center>
				<h1>Results shown here</h1>
				<p>
					Complete the form and click "calculate repayment" to see what your
					monthly repayment would be.
				</p>
			</div>
		</div>
	</body>
</html>
